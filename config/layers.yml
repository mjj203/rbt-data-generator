                --detect-longitude-wraparound, --simplify-only-low-zooms,
                --reorder, --coalesce,
                --no-tiny-polygon-reduction-at-maximum-zoom]

# Category → list of layer keys. Used for --transportation / --building / etc.
categories:
  cultural:
    aeroway: [aeroway_surface, airports, heliports, runway_curve]
    boundary: [adm0_labels, adm0_lines, adm1_labels, adm1_lines, adm2_labels, adm2_lines]
    building: [building]
    cemetery: [cemetery, cemetery_label]
    geonames: [geonames_hydrographic, populated_places]
    transportation:
      - highway
      - railway
      - ferry
      - port_surface
      - port_label
      - railway_station
      - railway_station_label
      - yard_label
      - lock
      - lock_label
    utilities:
      - dam_surface
      - dam_curve
      - dam_label
      - grain_srf
      - grain_srf_pnt
      - hydrocarbon_field
      - hydrocarbon_label
      - powerline
      - pipeline
      - utility_point
      - power_station
      - power_station_label
      - pumping_station
      - pumping_station_label
    other:
      - stadium_surface
      - stadium_labels
      - us_military_installations
      - us_military_installations_labels
      - radar_point
  physical:
    builtuparea: [builtuparea]
    contour: [contour, contour_glacier]
    glacier: [glacier]
    landcover: [landcover, landcover_labels]
    mountain: [mountain_label]
    park: [park]
    water: [water]
    water_label: [ne_water_labels]
    waterway: [waterway]
    inland_water: [inland_water_intermittent]

# =============================================================================
# Database schema files (run via `rbt schema`)
# =============================================================================
# Each key is a schema unit dispatched to psql. Paths are relative to the
# repository root. `rbt schema run --all` executes everything; individual
# units can be re-run after editing their SQL.
schemas:
  physical:
    type: physical
    sql: setup/data-sources/schemas/physical/physical-core.sql
    description: Core physical views (built-up areas, glaciers, mountain labels, parks)
  landcover:
    type: physical
    sql: setup/data-sources/schemas/physical/landcover.sql
    description: Landcover polygon and label views
  water:
    type: physical
    sql: setup/data-sources/schemas/physical/water-features.sql
    description: Water bodies, waterways, and water labels
  contour:
    type: physical
    sql: setup/data-sources/schemas/physical/terrain.sql
    description: Contour and glacier-contour zoom views
  cultural:
    type: cultural
    sql: setup/data-sources/schemas/cultural/cultural-core.sql
    description: >-
      Core cultural views (boundaries, buildings, places, cemeteries, ports,
      utilities, military)
  highway:
    type: cultural
    sql: setup/data-sources/schemas/cultural/transportation.sql
    description: Road network views (highway zoom variants)
  railway:
    type: cultural
    sql: setup/data-sources/schemas/cultural/transportation-railway.sql
    description: Railways, stations, and yard labels
  aero:
    type: cultural
    sql: setup/data-sources/schemas/cultural/infrastructure.sql
    description: Aviation views (airports, heliports, runways, aeroway surfaces)

# =============================================================================
# GDAL-MVT backend (EPSG:4326 only)
# =============================================================================
# The 4326 pipeline does NOT use tippecanoe: it drives GDAL's MVT driver
# directly (`ogr2ogr -f MVT -dsco TILING_SCHEME="EPSG:4326,-180,180,360"`).
# Each dataset is produced by a single multi-table ogr2ogr invocation whose
# CONF json maps source tables to target MVT layers with per-table zoom
# windows. Zoom-variant views (e.g. rbt.highway_z6) blend pre-simplified
# geometry into one target layer.
#
# Ported from production/tile-generation/{physical,cultural}/generate-*-4326.sh.
# Group keys deliberately match the `categories:` section above so the same
# CLI flags (--water, --transportation, ...) select work in every projection.
gdal_mvt:
  tiling_scheme: "EPSG:4326,-180,180,360"
  max_tile_size: 900000
  max_features: 500000
  datasets:
    physical:
      name: physical
      description: Physical vector tiles dataset
      groups:
        builtuparea:
          rbt.builtuparea_ne: {target: builtuparea, minzoom: 3, maxzoom: 8}
          rbt.builtuparea_osm: {target: builtuparea, minzoom: 8, maxzoom: 13}
        contour:
          rbt.contour_z8: {target: contour, minzoom: 8, maxzoom: 13}
          rbt.contour_z10: {target: contour, minzoom: 10, maxzoom: 13}
          rbt.contour_z12: {target: contour, minzoom: 12, maxzoom: 13}
          rbt.contour: {target: contour, minzoom: 13, maxzoom: 13}
          rbt.contour_glacier_z8: {target: contour_glacier, minzoom: 8, maxzoom: 13}
          rbt.contour_glacier_z10: {target: contour_glacier, minzoom: 10, maxzoom: 13}
          rbt.contour_glacier_z12: {target: contour_glacier, minzoom: 12, maxzoom: 13}
          rbt.contour_glacier: {target: contour_glacier, minzoom: 13, maxzoom: 13}
        glacier:
          rbt.glacier_ne: {target: glacier, minzoom: 0, maxzoom: 7}
          rbt.glacier_osm: {target: glacier, minzoom: 7, maxzoom: 13}
        landcover:
          rbt.landcover_z4: {target: landcover, minzoom: 4, maxzoom: 13}
          rbt.landcover_z6: {target: landcover, minzoom: 6, maxzoom: 13}
          rbt.landcover_z9: {target: landcover, minzoom: 9, maxzoom: 13}
          rbt.landcover_z10: {target: landcover, minzoom: 10, maxzoom: 13}
          rbt.landcover: {target: landcover, minzoom: 12, maxzoom: 13}
          rbt.landcover_labels_z4: {target: landcover_labels, minzoom: 4, maxzoom: 13}
          rbt.landcover_labels_z6: {target: landcover_labels, minzoom: 6, maxzoom: 13}
          rbt.landcover_labels_z9: {target: landcover_labels, minzoom: 9, maxzoom: 13}
          rbt.landcover_labels_z10: {target: landcover_labels, minzoom: 10, maxzoom: 13}
          rbt.landcover_labels: {target: landcover_labels, minzoom: 12, maxzoom: 13}
        mountain:
          rbt.mountain_label: {target: mountain_label, minzoom: 2, maxzoom: 13}
        park:
          rbt.park: {target: park, minzoom: 6, maxzoom: 13}
        water:
          rbt.water_simplified: {target: water, minzoom: 0, maxzoom: 9}
          rbt.water: {target: water, minzoom: 10, maxzoom: 13}
        water_label:
          rbt.ne_water_label: {target: ne_water_label, minzoom: 0, maxzoom: 13}
        waterway:
          rbt.waterway: {target: waterway, minzoom: 5, maxzoom: 13}
        inland_water:
          rbt.inland_water_intermittent_dissolved:
            {target: inland_water_intermittent, minzoom: 8, maxzoom: 13}
    cultural:
      name: cultural
      description: Cultural vector tiles dataset
      groups:
        aeroway:
          rbt.aeroway_surface: {target: aeroway_surface, minzoom: 8, maxzoom: 13}
          rbt.airports: {target: airports, minzoom: 5, maxzoom: 13}
          rbt.heliports: {target: heliports, minzoom: 5, maxzoom: 13}
          rbt.runway_curve: {target: runway_curve, minzoom: 8, maxzoom: 13}
