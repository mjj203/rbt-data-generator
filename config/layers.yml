# =============================================================================
# RBT Vector Tiles — Layer Registry
# =============================================================================
# Declarative definition of every tile layer the pipeline produces. The Python
# CLI (`src/rbt`) consumes this file to dispatch tippecanoe / ogr2ogr commands.
# This file is the single source of truth for layer definitions (the legacy
# bash generators it was extracted from were removed after output parity was
# verified — see docs/parity-runbook.md). Add new layers here.
#
# Schema (per layer):
#   source_table:        Postgres table/view used as ogr2ogr input (required).
#   layer_name:          Tippecanoe -l / -n name. Defaults to layer key.
#   min_zoom / max_zoom: -Z / -z.
#   projections:         Subset of [3857, 3395, 4326] — defaults to all three.
#   category:            Grouping for --transportation / --building / etc.
#   ogr2ogr:
#     spatial_index:     true  → default; false emits `-lco SPATIAL_INDEX=NO`.
#     skipfailures:      true by default.
#   tippecanoe:
#     options:           Raw CLI flags (e.g. [--drop-smallest-as-needed]).
#     int_attrs:         Columns coerced to integer.
#     float_attrs:       Columns coerced to float.
#     bool_attrs:        Columns coerced to boolean.
#     string_attrs:      Columns forced to string.
#     filter_ref:        Key into the `filters:` section below.
#   btis:                Whether this layer should receive BTIS metadata
#                        when produced in isolation. Consolidated files always
#                        receive BTIS when --add-btis is requested.
# =============================================================================

meta:
  btp_schema_version: "1.0.0"
  defaults:
    projection_list: [3857, 3395, 4326]
    min_zoom: 0
    max_zoom: 13
    tippecanoe_options:
      - --no-progress-indicator
      - --single-precision
    ogr2ogr:
      spatial_index: true
      skipfailures: true

filters:
  # Filter JSON strings live here verbatim. The Bash generators still inline
  # copies of these; treat this file as the source of truth going forward.
  building: |
    {"*":["any",
      ["all",[">=","$zoom",10],[">","area",5000]],
      ["all",[">=","$zoom",11],[">","area",2500]],
      ["all",[">=","$zoom",12],[">","area",1500]],
      ["all",[">=","$zoom",13]]
    ]}
  railway: |
    {"*":["any",
      ["all",[">=","$zoom",6],["!=","service","yard"]],
      ["all",[">=","$zoom",13]]
    ]}
  hydrographic: |
    {"*":["any",
      ["all",[">=","$zoom",1],["in","class","Ocean","Sea"]],
      ["all",[">=","$zoom",3],["in","class","Ocean","Sea","Gulf"]],
      ["all",[">=","$zoom",4],[">=","area",12417500000]],
      ["all",[">=","$zoom",5],[">=","area",9468380000]],
      ["all",[">=","$zoom",6],[">=","area",5608210000]],
      ["all",[">=","$zoom",7],[">=","area",1406880000]],
      ["all",[">=","$zoom",8],[">=","area",24216600]],
      ["all",[">=","$zoom",9],[">=","area",11804400]],
      ["all",[">=","$zoom",10],[">","area",0]],
      ["all",[">=","$zoom",12]]
    ]}
  populated_places: |
    {"*":["any",
      ["all",[">=","$zoom",3],["<","rank",8]],
      ["all",[">=","$zoom",7],["<","rank",11]],
      ["all",[">=","$zoom",9],["<","rank",12]],
      ["all",[">=","$zoom",12]]
    ]}
  utility: |
    {"*":["any",
      ["all",[">=","$zoom",6],["!in","subclass","utility_pole","pole","tower"]],
      ["all",[">=","$zoom",12],["!in","subclass","utility_pole","pole"]],
      ["all",[">=","$zoom",13]]
    ]}

cultural:
  aeroway_surface:
    category: aeroway
    source_table: rbt.aeroway_surface
    min_zoom: 8
    tippecanoe:
      options: [--extra-detail=13, --no-simplification-of-shared-nodes,
                --drop-smallest-as-needed, --simplify-only-low-zooms,
                --no-tiny-polygon-reduction-at-maximum-zoom]
      float_attrs: [area]
      int_attrs: [osm_id, osm_runway_id]

  airports:
    category: aeroway
    source_table: rbt.airports
    min_zoom: 5
    tippecanoe:
      options: [-r, "1", --drop-densest-as-needed]
      int_attrs: [airport_id, runway_length_ft, osm_runway_length_ft,
                  runway_width_ft, runway_lighted, runway_closed,
                  elevation_ft, osm_id_aerodrome, osm_id_runway,
                  category, rank]
      float_attrs: [runway_le_heading, runway_he_heading, osm_aerodrome_area]

  heliports:
    category: aeroway
    source_table: rbt.heliports
    min_zoom: 5
    tippecanoe:
      options: [-r, "1", --drop-densest-as-needed]
      int_attrs: [rank, elevation_ft]

  runway_curve:
