    source_table: rbt.runway_curve
    layer_name: runway_curve
    mbtiles_name: aeroway_curve
    min_zoom: 8
    tippecanoe:
      options: [--extra-detail=13, --drop-smallest-as-needed,
                --simplify-only-low-zooms, --no-simplification-of-shared-nodes]
