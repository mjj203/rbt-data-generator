# Processing Configuration for RBT Vector Tiles
# ===============================================

# General Processing Settings
MAX_PARALLEL_JOBS=${MAX_PARALLEL_JOBS:-4}
RETRY_COUNT=${RETRY_COUNT:-3}
RETRY_DELAY=${RETRY_DELAY:-30}
LOG_LEVEL=${LOG_LEVEL:-INFO}

# Tile Generation Settings
TILE_CACHE_DIR=${TILE_CACHE_DIR:-./output/tiles}
TILE_TEMP_DIR=${TILE_TEMP_DIR:-/tmp/tiles}
TILE_MAX_ZOOM=${TILE_MAX_ZOOM:-13}
TILE_MIN_ZOOM=${TILE_MIN_ZOOM:-0}

# Supported Projections
SUPPORTED_PROJECTIONS="3857 3395 4326"
DEFAULT_PROJECTION=${DEFAULT_PROJECTION:-3857}

# Layer Types
LAYER_TYPES="physical cultural"

# Data Processing Settings
CLEAN_TEMP_FILES=${CLEAN_TEMP_FILES:-true}
VALIDATE_DOWNLOADS=${VALIDATE_DOWNLOADS:-true}
PARALLEL_INGESTION=${PARALLEL_INGESTION:-false}

# Resource Limits
DISK_SPACE_REQUIRED_GB=${DISK_SPACE_REQUIRED_GB:-100}
MEMORY_REQUIRED_GB=${MEMORY_REQUIRED_GB:-16}

# Health Check Settings
HEALTH_CHECK_PORT=${HEALTH_CHECK_PORT:-8080}
HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL:-30}

# Database Configuration for RBT Vector Tiles
# ==============================================

# Database Connection Settings
# These variables provide centralized configuration while maintaining
# backward compatibility with existing environment variables
DATABASE_HOST=${PG_HOST:-localhost}
DATABASE_PORT=${PG_PORT:-5432}
DATABASE_NAME=${PG_DATABASE:-rbt}
DATABASE_USER=${PG_USR:-postgres}
DATABASE_PASSWORD=${PG_PASS:-}

# Database Performance Settings
DATABASE_WORK_MEM=${DATABASE_WORK_MEM:-32GB}
DATABASE_MAINTENANCE_WORK_MEM=${DATABASE_MAINTENANCE_WORK_MEM:-64GB}
DATABASE_MAX_PARALLEL_WORKERS=${DATABASE_MAX_PARALLEL_WORKERS:-8}
DATABASE_EFFECTIVE_CACHE_SIZE=${DATABASE_EFFECTIVE_CACHE_SIZE:-192GB}

# Connection Pool Settings
DATABASE_MAX_CONNECTIONS=${DATABASE_MAX_CONNECTIONS:-100}
DATABASE_CONNECTION_TIMEOUT=${DATABASE_CONNECTION_TIMEOUT:-300}

# Required Extensions
DATABASE_EXTENSIONS="postgis postgis_raster hstore pg_trgm"

# Required Schemas
DATABASE_SCHEMAS="fieldmap mirta naturalearth ourairports rbt geonames overture"

# OSM Data Import Configuration
# ============================

# File Paths
OSM_LOG_FILE=${OSM_LOG_FILE:-${SHARED_LOG_DIR:-./output/logs}/osm_import.log}
OSM_DATA_DIR=${OSM_DATA_DIR:-/mnt/data}
OSM_CONFIG_FILE=${OSM_CONFIG_FILE:-./setup/data-sources/osm/imposm-config.json}
OSM_MAPPING_FILE=${OSM_MAPPING_FILE:-./setup/data-sources/osm/imposm-mapping.yaml}
OSM_CACHE_DIR=${OSM_CACHE_DIR:-/mnt/cache}
OSM_DIFF_DIR=${OSM_DIFF_DIR:-/mnt/diff}

# Database Connection for OSM.
# Derived from the resolved DATABASE_* values above (which themselves fall back
# to legacy PG_* then defaults), so imposm targets the same database the rbt CLI
# provisions instead of a hardcoded localhost. Override OSM_CONNECTION directly
# only for an out-of-band imposm target.
OSM_CONNECTION=${OSM_CONNECTION:-postgis://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}?prefix=NONE}
# 4326 on purpose: the rbt.* schema SQL (water-features.sql etc.) casts the
# imposm tables' geometry to ::geometry(..., 4326); importing in 3857 makes
# every schema unit fail with an SRID mismatch.
OSM_SRID=${OSM_SRID:-4326}

# Download Settings
ARIA2C_MAX_DOWNLOADS=${ARIA2C_MAX_DOWNLOADS:-12}
ARIA2C_MAX_CONNECTIONS=${ARIA2C_MAX_CONNECTIONS:-16}
ARIA2C_SPLITS=${ARIA2C_SPLITS:-9}
WGET_PARALLEL_JOBS=${WGET_PARALLEL_JOBS:-8}

# Diff Processing Settings
DIFF_START_SEQ=${DIFF_START_SEQ:-713}
DIFF_END_SEQ=${DIFF_END_SEQ:-730}

# Processing Options
OSM_CLEANUP_ON_EXIT=${OSM_CLEANUP_ON_EXIT:-true}
OSM_VALIDATE_DOWNLOADS=${OSM_VALIDATE_DOWNLOADS:-true}
# Minimum acceptable PBF size in MB for the sanity check. Planet-sized floor by
# default so a truncated planet download is caught; lower it (e.g. 10) only when
# importing a small regional extract.
OSM_MIN_PBF_SIZE_MB=${OSM_MIN_PBF_SIZE_MB:-50000}
OSM_HEALTH_CHECK_PORT=${OSM_HEALTH_CHECK_PORT:-8080}

# Overture Buildings Configuration
# =================================
# Release + bucket used by BOTH Overture paths: `rbt import buildings` (PostGIS)
# and `rbt export buildings` (DuckDB → FlatGeobuf). The DuckDB SQL now reads
# OVERTURE_RELEASE/OVERTURE_S3_BUCKET at run time, so the two paths stay in
# lockstep automatically — no manual pin to keep in sync. Overture retains only
# a rolling window of releases on the public bucket; override per run with
# `--release`.
OVERTURE_RELEASE=${OVERTURE_RELEASE:-2026-06-17.0}
OVERTURE_S3_BUCKET=${OVERTURE_S3_BUCKET:-s3://overturemaps-us-west-2/}

# DuckDB export (`rbt export buildings`). OVERTURE_EXPORT_DIR is where the six
# building_*.fgb files are written (override per run with --output-dir). The
# DuckDB memory limit defaults assume a large dedicated machine — lower
# DUCKDB_MEMORY_LIMIT (e.g. 16GB) to match available RAM; DuckDB spills to
# DUCKDB_TEMP_DIRECTORY (defaults to the export dir) when it exceeds the limit.
OVERTURE_EXPORT_DIR=${OVERTURE_EXPORT_DIR:-./output/buildings}
DUCKDB_MEMORY_LIMIT=${DUCKDB_MEMORY_LIMIT:-200GB}
DUCKDB_MAX_TEMP_SIZE=${DUCKDB_MAX_TEMP_SIZE:-2900GB}
DUCKDB_TEMP_DIRECTORY=${DUCKDB_TEMP_DIRECTORY:-${OVERTURE_EXPORT_DIR:-./output/buildings}}

# Common Script Configuration
# ===========================

# Logging and Temporary Directories
SHARED_LOG_DIR=${SHARED_LOG_DIR:-./output/logs}
SHARED_TEMP_DIR=${SHARED_TEMP_DIR:-./output/temp}

# Processing Options
# The retired SCRIPT_*-prefixed aliases (SCRIPT_MAX_PARALLEL_JOBS,
# SCRIPT_RETRY_COUNT, ...) are gone with the bash importers; use the
# unprefixed keys in the "General Processing Settings" section above.
# SCRIPT_DEBUG / SCRIPT_VERBOSE remain accepted as aliases of DEBUG / VERBOSE.
SCRIPT_DEBUG=${SCRIPT_DEBUG:-false}
SCRIPT_VERBOSE=${SCRIPT_VERBOSE:-false}