global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: rbt-tiles
    metrics_path: /metrics
    static_configs:
      - targets: ["rbt-tiles:8080"]

  - job_name: rbt-osm-updates
    metrics_path: /metrics
    static_configs:
      - targets: ["rbt-osm-updates:8080"]

  - job_name: postgres
    static_configs:
      - targets: ["postgres:9187"]
