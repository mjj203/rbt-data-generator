name: Docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
      # `mkdocs build --strict` imports rbt.cli and regenerates docs/cli.md, so
      # CLI/packaging changes can break the docs build even with no docs edit.
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-docs.txt
      - name: Install docs dependencies
        run: |
          pip install -r requirements-docs.txt
          # The CLI reference page imports rbt.cli at build time.
          pip install -e .
      - name: Build site
        run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
