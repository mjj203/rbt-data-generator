name: Nightly integration

# Tier-2 integration testing on a real (small) OSM extract. The per-PR
# `integration-tiles` job in ci.yml covers the tile backends against synthetic
# seed tables; this workflow covers the real pipeline — imposm import of the
# committed Liechtenstein fixture, schema processing, and tile generation in
# all three projections — plus a probe of small live upstream data sources.
#
# Trigger manually with: gh workflow run nightly.yml

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  # TEMPORARY validation trigger — remove before merge. schedule/
  # workflow_dispatch only fire once this file is on the default branch, so
  # the PR run is the only way to prove the jobs green pre-merge.
  pull_request:
    paths:
      - ".github/workflows/nightly.yml"
      - "tests/fixtures/**"

env:
  # See ci.yml for why both are needed under GitHub Actions.
  NO_COLOR: "1"
  _TYPER_FORCE_DISABLE_TERMINAL: "1"

jobs:
  nightly-osm-fixture:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_USER: rbt_user
          POSTGRES_PASSWORD: rbt_password
          POSTGRES_DB: rbt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rbt_user -d rbt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_HOST: localhost
      PG_PORT: 5432
      PG_DATABASE: rbt
      PG_USR: rbt_user
      PG_PASS: rbt_password
    steps:
      - uses: actions/checkout@v7
      - name: Install runtime dependencies
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --batch --yes --dearmor -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          # aria2/osmium-tool/osmosis: the OSM importer validates its full
          # dependency list even when only the `--import` stage runs.
          sudo apt-get install -y postgresql-client-18 sqlite3 aria2 osmium-tool osmosis
      - name: Install GDAL via micromamba
        run: |
          curl -fsSL "https://github.com/mamba-org/micromamba-releases/releases/download/2.8.1-0/micromamba-linux-64" \
            -o /usr/local/bin/micromamba
          sudo chmod +x /usr/local/bin/micromamba
          MAMBA_ROOT_PREFIX="$HOME/micromamba" /usr/local/bin/micromamba create -y -n geo -c conda-forge gdal=3.13.1 libgdal-pg=3.13.1
          echo "$HOME/micromamba/envs/geo/bin" >> "$GITHUB_PATH"
      - name: Install imposm 0.14.2
        run: |
          curl -fsSL -o "$RUNNER_TEMP/imposm.tar.gz" \
            "https://github.com/omniscale/imposm3/releases/download/v0.14.2/imposm-0.14.2-linux-x86-64.tar.gz"
          mkdir -p "$HOME/imposm"
          tar -xzf "$RUNNER_TEMP/imposm.tar.gz" -C "$HOME/imposm" --strip-components=1
          test -x "$HOME/imposm/imposm"
          echo "$HOME/imposm" >> "$GITHUB_PATH"
      - name: Cache tippecanoe
        id: cache-tippecanoe
        uses: actions/cache@v6
        with:
          path: ~/tippecanoe-prefix
          key: tippecanoe-2.79.0-ubuntu24
      - name: Build tippecanoe 2.79.0
        if: steps.cache-tippecanoe.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 --branch 2.79.0 https://github.com/felt/tippecanoe.git "$RUNNER_TEMP/tippecanoe"
          make -C "$RUNNER_TEMP/tippecanoe" -j"$(nproc)"
          make -C "$RUNNER_TEMP/tippecanoe" install PREFIX="$HOME/tippecanoe-prefix"
      - name: Add tippecanoe to PATH
        run: |
          test -x "$HOME/tippecanoe-prefix/bin/tippecanoe"
          test -x "$HOME/tippecanoe-prefix/bin/tippecanoe-decode"
          test -x "$HOME/tippecanoe-prefix/bin/tile-join"
          echo "$HOME/tippecanoe-prefix/bin" >> "$GITHUB_PATH"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Set up Python CLI
        # Pin to a standard 3.13: the micromamba env's python is freethreaded
        # 3.14 with no psycopg-binary wheel (see ci.yml).
        run: ~/.local/bin/uv sync --python 3.13
      - name: Bootstrap database
        run: ~/.local/bin/uv run rbt --no-log-file setup --setup-database
      - name: Stage OSM fixture
        run: |
          mkdir -p "$RUNNER_TEMP"/osm-data "$RUNNER_TEMP"/osm-cache "$RUNNER_TEMP"/osm-diff
          # The importer reads the fixed name planet.osm.pbf from OSM_DATA_DIR.
          cp tests/fixtures/liechtenstein-*.osm.pbf "$RUNNER_TEMP/osm-data/planet.osm.pbf"
      - name: Import OSM fixture via imposm
        env:
          OSM_DATA_DIR: ${{ runner.temp }}/osm-data
          OSM_CACHE_DIR: ${{ runner.temp }}/osm-cache
          OSM_DIFF_DIR: ${{ runner.temp }}/osm-diff
          # Admit the ~3.4 MB extract past the planet-scale size floor.
          OSM_MIN_PBF_SIZE_MB: "1"
        run: ~/.local/bin/uv run rbt --no-log-file setup --import-osm-data --osm-arg=--import
      - name: Seed reference-table stubs
        run: |
          psql "host=localhost port=5432 dbname=rbt user=rbt_user password=rbt_password" \
            -v ON_ERROR_STOP=1 -f tests/fixtures/seed_reference_stubs.sql
      - name: Run schema units (water landcover highway railway)
        # The remaining units need real reference data (or are broken on fresh
        # imports — see the follow-up issues referenced in docs/operations.md).
        run: ~/.local/bin/uv run rbt --no-log-file schema run water landcover highway railway
      - name: Verify rbt views are populated
        run: |
          set -euxo pipefail
          conn="host=localhost port=5432 dbname=rbt user=rbt_user password=rbt_password"
          for rel in rbt.water rbt.waterway rbt.landcover rbt.highway rbt.railway; do
            count="$(psql "$conn" -tA -c "SELECT count(*) FROM $rel")"
            echo "$rel: $count rows"
            test "$count" -gt 0
          done
      - name: Generate physical tiles (EPSG:3857, tile-join + BTIS)
        run: |
          ~/.local/bin/uv run rbt --no-log-file tiles \
            --layer-type physical --projection 3857 --water --landcover --waterway
      - name: Verify EPSG:3857 output (joined + per-layer)
        run: |
          set -euxo pipefail
          joined=output/tiles/physical/3857/physical_3857.mbtiles
          test -f "$joined"
          tippecanoe-decode --stats "$joined" | grep -q '"water"'
          tippecanoe-decode --stats "$joined" | grep -q '"landcover"'
          tippecanoe-decode --stats "$joined" | grep -q '"waterway"'
          per_layer=output/tiles/physical/3857/water_3857.mbtiles
          test -f "$per_layer"
          crs="$(sqlite3 "$per_layer" "SELECT value FROM metadata WHERE name='crs'")"
          test "$crs" = "EPSG:3857"
          btp="$(sqlite3 "$joined" "SELECT value FROM metadata WHERE name='btp_schema_version'")"
          test -n "$btp"
          counts="$(tippecanoe-decode --stats "$per_layer" | python3 .github/scripts/tilestats.py counts)"
          echo "water tilestats: $counts"
          echo "$counts" | python3 -c 'import json,sys; assert json.load(sys.stdin)["water"] > 0'
      - name: Generate physical tiles (EPSG:3395)
        run: |
          ~/.local/bin/uv run rbt --no-log-file tiles \
            --layer-type physical --projection 3395 --water --no-tile-join
      - name: Verify EPSG:3395 output
        run: |
          set -euxo pipefail
          mbtiles=output/tiles/physical/3395/water_3395.mbtiles
          test -f "$mbtiles"
          crs="$(sqlite3 "$mbtiles" "SELECT value FROM metadata WHERE name='crs'")"
          test "$crs" = "EPSG:3395"
          tippecanoe-decode --stats "$mbtiles" | grep -q '"water"'
      - name: Generate physical tiles (EPSG:4326, GDAL MVT backend)
        run: |
          ~/.local/bin/uv run rbt --no-log-file tiles \
            --layer-type physical --projection 4326 --water --landcover
      - name: Verify EPSG:4326 tile directory
        run: |
          set -euxo pipefail
          tile_dir=output/tiles/physical/4326/physical_tiles
          test -f "$tile_dir/metadata.json"
          grep -q 'EPSG:4326' "$tile_dir/metadata.json"
          grep -q '"water"' "$tile_dir/metadata.json"
          grep -q '"landcover"' "$tile_dir/metadata.json"
          pbf_count="$(find "$tile_dir" -name '*.pbf' | wc -l)"
          echo "4326 tiles: $pbf_count"
          test "$pbf_count" -gt 0
          find "$tile_dir" -name '*.pbf' | awk -F/ '{print $(NF-2)}' | sort -n | uniq -c
      - name: Generate cultural tiles (EPSG:3857, highway + railway)
        # --layer, not --transportation: that category also selects ferry/port/
        # lock views created only by the `cultural` schema unit, which cannot
        # run on a fresh OSM-only database.
        run: |
          ~/.local/bin/uv run rbt --no-log-file tiles \
            --layer-type cultural --projection 3857 \
            --layer highway --layer railway --no-tile-join
      - name: Verify cultural EPSG:3857 output
        run: |
          set -euxo pipefail
          for layer in highway railway; do
            mbtiles="output/tiles/cultural/3857/${layer}_3857.mbtiles"
            test -f "$mbtiles"
            tippecanoe-decode --stats "$mbtiles" | grep -q "\"$layer\""
          done
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: nightly-osm-fixture-logs
          path: output/logs/
          if-no-files-found: ignore

  # Probes small live upstream sources so schema/availability drift surfaces
  # here instead of during a real import. continue-on-error while the job
  # burns in — flip to false once it has proven stable for a couple of weeks.
  upstream-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Probe OurAirports CSVs
        run: |
          set -euxo pipefail
          for f in airports runways; do
            curl -fsSL -o "$RUNNER_TEMP/$f.csv" \
              "https://raw.githubusercontent.com/davidmegginson/ourairports-data/refs/heads/main/$f.csv"
            test "$(stat -c%s "$RUNNER_TEMP/$f.csv")" -gt 100000
          done
          # Columns the reference importer and infrastructure.sql consume.
          head -1 "$RUNNER_TEMP/airports.csv" | grep -q 'latitude_deg'
          head -1 "$RUNNER_TEMP/airports.csv" | grep -q 'longitude_deg'
          head -1 "$RUNNER_TEMP/airports.csv" | grep -q 'ident'
          head -1 "$RUNNER_TEMP/runways.csv" | grep -q 'length_ft'
      - name: Probe NGA GNS (smallest feature-class zip)
        run: |
          set -euxo pipefail
          curl -fsSL --connect-timeout 30 --retry 3 --retry-all-errors -m 180 \
            -o "$RUNNER_TEMP/Undersea.zip" \
            "https://geonames.nga.mil/geonames/GNSData/fc_files/Undersea.zip"
          test "$(stat -c%s "$RUNNER_TEMP/Undersea.zip")" -gt 10000
          # Columns the geonames importer maps to geometry must be present.
          python3 .github/scripts/check_gns_header.py "$RUNNER_TEMP/Undersea.zip"

  # TEMPORARY (deleted with the bash generators): executes the parity runbook
  # (docs/parity-runbook.md §2-§3) against the fixture-populated database —
  # bash and native tile generation compared on real data. Water compares with
  # relaxed criteria because of the pinned, deliberate option drift documented
  # in tests/parity_support.py (bash passes -X/--coalesce/--reorder; native
  # adds --no-simplification-of-shared-nodes), which changes encoded feature
  # attributes but not tiling. Building compares strictly.
  parity-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgis/postgis:18-3.6
        env:
          POSTGRES_USER: rbt_user
          POSTGRES_PASSWORD: rbt_password
          POSTGRES_DB: rbt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rbt_user -d rbt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_HOST: localhost
      PG_PORT: 5432
      PG_DATABASE: rbt
      PG_USR: rbt_user
      PG_PASS: rbt_password
    steps:
      - uses: actions/checkout@v7
      - name: Install runtime dependencies
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --batch --yes --dearmor -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18 sqlite3 aria2 osmium-tool osmosis
      - name: Install GDAL via micromamba
        run: |
          curl -fsSL "https://github.com/mamba-org/micromamba-releases/releases/download/2.8.1-0/micromamba-linux-64" \
            -o /usr/local/bin/micromamba
          sudo chmod +x /usr/local/bin/micromamba
          MAMBA_ROOT_PREFIX="$HOME/micromamba" /usr/local/bin/micromamba create -y -n geo -c conda-forge gdal=3.13.1 libgdal-pg=3.13.1
          echo "$HOME/micromamba/envs/geo/bin" >> "$GITHUB_PATH"
      - name: Install imposm 0.14.2
        run: |
          curl -fsSL -o "$RUNNER_TEMP/imposm.tar.gz" \
            "https://github.com/omniscale/imposm3/releases/download/v0.14.2/imposm-0.14.2-linux-x86-64.tar.gz"
          mkdir -p "$HOME/imposm"
          tar -xzf "$RUNNER_TEMP/imposm.tar.gz" -C "$HOME/imposm" --strip-components=1
          echo "$HOME/imposm" >> "$GITHUB_PATH"
      - name: Cache tippecanoe
        id: cache-tippecanoe
        uses: actions/cache@v6
        with:
          path: ~/tippecanoe-prefix
          key: tippecanoe-2.79.0-ubuntu24
      - name: Build tippecanoe 2.79.0
        if: steps.cache-tippecanoe.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 --branch 2.79.0 https://github.com/felt/tippecanoe.git "$RUNNER_TEMP/tippecanoe"
          make -C "$RUNNER_TEMP/tippecanoe" -j"$(nproc)"
          make -C "$RUNNER_TEMP/tippecanoe" install PREFIX="$HOME/tippecanoe-prefix"
      - name: Add tippecanoe to PATH
        run: |
          echo "$HOME/tippecanoe-prefix/bin" >> "$GITHUB_PATH"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Set up Python CLI
        run: ~/.local/bin/uv sync --python 3.13
      - name: Bootstrap database and import fixture
        env:
          OSM_DATA_DIR: ${{ runner.temp }}/osm-data
          OSM_CACHE_DIR: ${{ runner.temp }}/osm-cache
          OSM_DIFF_DIR: ${{ runner.temp }}/osm-diff
          OSM_MIN_PBF_SIZE_MB: "1"
        run: |
          ~/.local/bin/uv run rbt --no-log-file setup --setup-database
          mkdir -p "$RUNNER_TEMP"/osm-data "$RUNNER_TEMP"/osm-cache "$RUNNER_TEMP"/osm-diff
          cp tests/fixtures/liechtenstein-*.osm.pbf "$RUNNER_TEMP/osm-data/planet.osm.pbf"
          ~/.local/bin/uv run rbt --no-log-file setup --import-osm-data --osm-arg=--import
      - name: Seed stubs, building fixture, and schema units
        run: |
          conn="host=localhost port=5432 dbname=rbt user=rbt_user password=rbt_password"
          psql "$conn" -v ON_ERROR_STOP=1 -f tests/fixtures/seed_reference_stubs.sql
          psql "$conn" -v ON_ERROR_STOP=1 -f tests/fixtures/seed_building.sql
          ~/.local/bin/uv run rbt --no-log-file schema run water landcover highway railway
      - name: Generate tiles — native engine
        run: |
          ~/.local/bin/uv run rbt --no-log-file tiles \
            --layer-type physical --projection 3857 --water --no-tile-join
          ~/.local/bin/uv run rbt --no-log-file tiles \
            --layer-type physical --projection 3395 --water --no-tile-join
          ~/.local/bin/uv run rbt --no-log-file tiles \
            --layer-type cultural --projection 3857 --building --no-tile-join
          # Bash 4326 `--water` emits the whole water *group* (water,
          # ne_water_label, waterway, inland_water_intermittent); select the
          # matching native categories so both sides produce the same layers.
          ~/.local/bin/uv run rbt --no-log-file tiles \
            --layer-type physical --projection 4326 \
            --water --water-label --waterway --inland-water
      - name: Generate tiles — deprecated bash generators
        run: |
          ~/.local/bin/uv run rbt --no-log-file tiles --mode bash \
            --layer-type physical --projection 3857 --water --no-tile-join
          ~/.local/bin/uv run rbt --no-log-file tiles --mode bash \
            --layer-type physical --projection 3395 --water --no-tile-join
          ~/.local/bin/uv run rbt --no-log-file tiles --mode bash \
            --layer-type cultural --projection 3857 --building --no-tile-join
          ~/.local/bin/uv run rbt --no-log-file tiles --mode bash \
            --layer-type physical --projection 4326 --water
      - name: Compare outputs (parity runbook §2-§3)
        run: |
          set -euo pipefail
          # Bash generators write CWD-relative output inside their script dirs.
          BASH_PHYS=production/tile-generation/physical
          BASH_CULT=production/tile-generation/cultural

          compare_mbtiles() {  # <native.mbtiles> <bash.mbtiles> <layer> <mode>
            local native="$1" bash_f="$2" layer="$3" mode="$4"
            echo "::group::compare $layer ($mode): $native vs $bash_f"
            test -f "$native" && test -f "$bash_f"

            # Per-zoom tile counts must match exactly.
            sqlite3 "$native" "SELECT zoom_level, count(*) FROM tiles GROUP BY 1 ORDER BY 1" > /tmp/native-counts.txt
            sqlite3 "$bash_f" "SELECT zoom_level, count(*) FROM tiles GROUP BY 1 ORDER BY 1" > /tmp/bash-counts.txt
            diff /tmp/native-counts.txt /tmp/bash-counts.txt
            test -s /tmp/native-counts.txt

            # Core metadata must match (generator/build fields excluded).
            for key in format minzoom maxzoom; do
              n="$(sqlite3 "$native" "SELECT value FROM metadata WHERE name='$key'")"
              b="$(sqlite3 "$bash_f" "SELECT value FROM metadata WHERE name='$key'")"
              echo "  $key: native=$n bash=$b"
              test "$n" = "$b"
            done

            # Layer-name sets from decoded stats must match.
            tippecanoe-decode --stats "$native" | python3 .github/scripts/tilestats.py names > /tmp/native-layers.txt
            tippecanoe-decode --stats "$bash_f" | python3 .github/scripts/tilestats.py names > /tmp/bash-layers.txt
            diff /tmp/native-layers.txt /tmp/bash-layers.txt

            if [ "$mode" = "strict" ]; then
              # Feature counts per layer must match too.
              tippecanoe-decode --stats "$native" | python3 .github/scripts/tilestats.py counts > /tmp/native-feat.txt
              tippecanoe-decode --stats "$bash_f" | python3 .github/scripts/tilestats.py counts > /tmp/bash-feat.txt
              diff /tmp/native-feat.txt /tmp/bash-feat.txt
            else
              echo "  (relaxed mode: feature/attribute equality skipped — pinned drift, see tests/parity_support.py)"
            fi
            echo "::endgroup::"
          }

          compare_mbtiles output/tiles/physical/3857/water_3857.mbtiles \
            "$BASH_PHYS/physical_tiles_3857/water_3857.mbtiles" water relaxed
          compare_mbtiles output/tiles/physical/3395/water_3395.mbtiles \
            "$BASH_PHYS/physical_tiles_3395/water_3395.mbtiles" water relaxed
          compare_mbtiles output/tiles/cultural/3857/building_3857.mbtiles \
            "$BASH_CULT/cultural_tiles_3857/building_3857.mbtiles" building strict

          echo "::group::compare 4326 tile directories"
          NATIVE_DIR=output/tiles/physical/4326/physical_tiles
          BASH_DIR="$BASH_PHYS/physical_tiles"
          test -f "$NATIVE_DIR/metadata.json" && test -f "$BASH_DIR/metadata.json"
          # Same projection/tiling scheme (category grouping in metadata.json
          # deliberately differs between the implementations).
          for key in projection tiling_scheme format minzoom maxzoom; do
            n="$(python3 -c "import json;print(json.load(open('$NATIVE_DIR/metadata.json')).get('$key'))")"
            b="$(python3 -c "import json;print(json.load(open('$BASH_DIR/metadata.json')).get('$key'))")"
            echo "  $key: native=$n bash=$b"
            test "$n" = "$b"
          done
          # Per-zoom .pbf counts must match exactly.
          find "$NATIVE_DIR" -name '*.pbf' | awk -F/ '{print $(NF-2)}' | sort -n | uniq -c > /tmp/native-4326.txt
          find "$BASH_DIR" -name '*.pbf' | awk -F/ '{print $(NF-2)}' | sort -n | uniq -c > /tmp/bash-4326.txt
          cat /tmp/native-4326.txt
          diff /tmp/native-4326.txt /tmp/bash-4326.txt
          test -s /tmp/native-4326.txt
          echo "::endgroup::"

          echo "PARITY BRIDGE: all comparisons passed"
      - name: Upload outputs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: parity-bridge-outputs
          path: |
            output/logs/
            /tmp/native-*.txt
            /tmp/bash-*.txt
          if-no-files-found: ignore
