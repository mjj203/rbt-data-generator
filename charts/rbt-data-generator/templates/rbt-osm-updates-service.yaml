{{- if .Values.production.osmUpdates.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rbt-data-generator.fullname" . }}-osm-updates
  labels:
    {{- include "rbt-data-generator.labels" . | nindent 4 }}
    app.kubernetes.io/component: osm-updates
spec:
  type: ClusterIP
  selector:
    {{- include "rbt-data-generator.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: osm-updates
  ports:
    - name: metrics
      port: {{ .Values.production.osmUpdates.metricsPort }}
      targetPort: metrics
{{- end }}
