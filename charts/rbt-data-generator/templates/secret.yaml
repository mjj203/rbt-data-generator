{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rbt-data-generator.secretName" . }}
  labels:
    {{- include "rbt-data-generator.labels" . | nindent 4 }}
type: Opaque
stringData:
  # The rbt CLI and the leaf importers read both variable spellings.
  PG_PASS: {{ .Values.auth.password | quote }}
  DATABASE_PASSWORD: {{ .Values.auth.password | quote }}
{{- end }}
