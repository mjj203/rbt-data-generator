{{- if .Values.setup.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "rbt-data-generator.fullname" . }}-setup
  labels:
    {{- include "rbt-data-generator.labels" . | nindent 4 }}
    app.kubernetes.io/component: setup
spec:
  backoffLimit: {{ .Values.setup.backoffLimit }}
  {{- if gt (int .Values.setup.activeDeadlineSeconds) 0 }}
  activeDeadlineSeconds: {{ .Values.setup.activeDeadlineSeconds }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "rbt-data-generator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: setup
    spec:
      restartPolicy: Never
      {{- include "rbt-data-generator.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "rbt-data-generator.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "rbt-data-generator.waitForPostgres" . | nindent 8 }}
      containers:
        - name: rbt-setup
          image: {{ include "rbt-data-generator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["rbt", "setup", "--all"]
          envFrom:
            {{- include "rbt-data-generator.rbtEnvFrom" . | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: output
              mountPath: /app/output
          {{- with .Values.setup.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: {{ include "rbt-data-generator.outputClaimName" . }}
      {{- with .Values.setup.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.setup.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.setup.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
