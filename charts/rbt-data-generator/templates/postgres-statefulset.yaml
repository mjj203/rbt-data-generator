{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "rbt-data-generator.fullname" . }}-postgres
  labels:
    {{- include "rbt-data-generator.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "rbt-data-generator.postgresServiceName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "rbt-data-generator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "rbt-data-generator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      {{- include "rbt-data-generator.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "rbt-data-generator.serviceAccountName" . }}
      {{- with .Values.postgres.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.registry }}/{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          args: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
          env:
            - name: POSTGRES_DB
              value: {{ .Values.config.pgDatabase | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.config.pgUser | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "rbt-data-generator.secretName" . }}
                  key: {{ .Values.auth.passwordKey }}
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
            # postgres_data is mounted at /var/lib/postgresql (matching compose),
            # so PGDATA is the data subdir of that volume.
            - name: PGDATA
              value: /var/lib/postgresql/data
          ports:
            - name: postgres
              containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
            - name: config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
              readOnly: true
          # Crash recovery on a planet-scale database can take minutes before
          # postgres accepts connections; the startup probe (up to 5 minutes)
          # holds off liveness kills during that window.
          startupProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.config.pgUser | quote }}, "-d", {{ .Values.config.pgDatabase | quote }}]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.config.pgUser | quote }}, "-d", {{ .Values.config.pgDatabase | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.config.pgUser | quote }}, "-d", {{ .Values.config.pgDatabase | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.postgres.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "rbt-data-generator.fullname" . }}-postgresql
        {{- if .Values.postgres.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.postgres.persistence.existingClaim }}
        {{- else if not .Values.postgres.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
      {{- with .Values.postgres.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgres.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.postgres.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if and .Values.postgres.persistence.enabled (not .Values.postgres.persistence.existingClaim) }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "rbt-data-generator.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.postgres.persistence.accessMode }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size | quote }}
        {{- if .Values.postgres.persistence.storageClassName }}
        storageClassName: {{ .Values.postgres.persistence.storageClassName | quote }}
        {{- end }}
  {{- end }}
{{- end }}
