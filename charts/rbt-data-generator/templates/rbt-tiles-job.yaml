{{- if .Values.production.tiles.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "rbt-data-generator.fullname" . }}-tiles
  labels:
    {{- include "rbt-data-generator.labels" . | nindent 4 }}
    app.kubernetes.io/component: tiles
spec:
  backoffLimit: {{ .Values.production.tiles.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "rbt-data-generator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tiles
    spec:
      restartPolicy: Never
      {{- include "rbt-data-generator.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "rbt-data-generator.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "rbt-data-generator.waitForPostgres" . | nindent 8 }}
      containers:
        - name: rbt-tiles
          image: {{ include "rbt-data-generator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Default image CMD, made explicit here.
          command: ["rbt", "tiles", "--all"]
          env:
            - name: TILE_CACHE_DIR
              value: {{ .Values.production.tiles.tileCacheDir | quote }}
          envFrom:
            {{- include "rbt-data-generator.rbtEnvFrom" . | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: output
              mountPath: /app/output
          {{- with .Values.production.tiles.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: {{ include "rbt-data-generator.outputClaimName" . }}
      {{- with .Values.production.tiles.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.production.tiles.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.production.tiles.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
