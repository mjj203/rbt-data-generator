{{- if .Values.production.osmUpdates.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rbt-data-generator.fullname" . }}-osm-updates
  labels:
    {{- include "rbt-data-generator.labels" . | nindent 4 }}
    app.kubernetes.io/component: osm-updates
spec:
  # Single replica only: the supervisor uses a pidfile and manages one imposm
  # child; concurrent updaters would corrupt the diff state.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "rbt-data-generator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: osm-updates
  template:
    metadata:
      labels:
        {{- include "rbt-data-generator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: osm-updates
    spec:
      {{- include "rbt-data-generator.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "rbt-data-generator.serviceAccountName" . }}
      # imposm needs ~30s after SIGTERM to shut down cleanly (compose used 35s).
      terminationGracePeriodSeconds: {{ .Values.production.osmUpdates.terminationGracePeriodSeconds }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        {{- include "rbt-data-generator.waitForPostgres" . | nindent 8 }}
      containers:
        - name: rbt-osm-updates
          image: {{ include "rbt-data-generator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["rbt", "osm", "run"]
          envFrom:
            {{- include "rbt-data-generator.rbtEnvFrom" . | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.production.osmUpdates.metricsPort }}
          livenessProbe:
            exec:
              command: ["rbt", "health"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["rbt", "health"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: output
              mountPath: /app/output
            {{- if .Values.cache.osm.enabled }}
            - name: osm-cache
              mountPath: /app/cache
            {{- end }}
          {{- with .Values.production.osmUpdates.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: {{ include "rbt-data-generator.outputClaimName" . }}
        {{- if .Values.cache.osm.enabled }}
        - name: osm-cache
          persistentVolumeClaim:
            claimName: {{ include "rbt-data-generator.osmCacheClaimName" . }}
        {{- end }}
      {{- with .Values.production.osmUpdates.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.production.osmUpdates.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.production.osmUpdates.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
