# PostgreSQL 18 configuration for RBT Vector Tiles.
#
# These values target a moderate-size single-node server (32-64 GB RAM, 8-16 cores).
# For the recommended deployment profile (512 GB RAM, 64 cores) see docs/performance.md
# and raise shared_buffers / effective_cache_size proportionally.
#
# Mount this file read-only at /etc/postgresql/postgresql.conf and start postgres with
# `-c config_file=/etc/postgresql/postgresql.conf`.

# Connection settings
listen_addresses = '*'
max_connections = 100

# Memory
shared_buffers = 4GB
work_mem = 64MB
maintenance_work_mem = 512MB
effective_cache_size = 12GB

# Checkpoint / WAL
wal_level = replica
wal_compression = on
max_wal_size = 4GB
min_wal_size = 1GB
checkpoint_completion_target = 0.9

# Query planner (PostGIS-friendly)
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Parallelism
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4
max_parallel_workers = 8

# Logging
# Log to stderr so entries are captured by `docker logs` / the container's log
# driver. The logging collector is intentionally left off: it requires a
# writable log_directory, and neither the postgis image nor docker-compose.yml
# provisions one, which would make a collector failure fatal at startup. Mount
# a writable volume at a log_directory and re-enable logging_collector if
# on-disk log files are required.
log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0

# Autovacuum — important for the high-churn `import.*` tables during OSM updates
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 15s

# PostGIS / pg_trgm tuning
jit = off
