site_name: RBT Vector Tiles Documentation
site_description: Comprehensive geospatial vector tile generation system for multi-projection mapping
site_author: Michael Jones
site_url: https://mjj203.github.io/rbt-data-generator/

# Repository
repo_name: MJJ203/rbt-data-generator
repo_url: https://github.com/MJJ203/rbt-data-generator
edit_uri: edit/main/docs/


# Configuration
theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - header.autohide
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - toc.integrate
  icon:
    repo: fontawesome/brands/git-alt
    edit: material/pencil
    view: material/eye
  font:
    text: Roboto
    code: Roboto Mono

# Build hooks
hooks:
  - docs/_hooks/gen_cli_reference.py

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mermaid2
  - git-revision-date-localized:
      enable_creation_date: true
  - swagger-ui-tag:
      tryItOutEnabled: true
  - pdf-export:
      verbose: true
      media_type: print
      enabled_if_env: ENABLE_PDF_EXPORT
  - print-site:
      add_to_navigation: true
# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [".", "docs"]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

# Customization
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MJJ203/rbt-data-generator
      name: GitHub Repository
  status:
    new: Recently added
    deprecated: Deprecated

# Page tree
nav:
  - Home: index.md
  - Overview:
    - Project Tour: project-structure.md
    - Architecture: architecture.md
    - Data Sources & Licensing: data-sources.md
  - Install & Deploy:
    - Installation: installation.md
    - Getting Started Tutorial: getting-started.md
    - Operations Guide: operations.md
    - Performance & Sizing: performance.md
  - Database:
    - Schema Reference: database-schema.md
    - Database Initialization: database-initialization.md
    - OSM Import Pipeline: osm-import.md
  - Tile Generation:
    - Physical Layers: physical-layers.md
    - Cultural Layers: cultural-layers.md
    - DuckDB Buildings Export: duckdb-buildings.md
    - Parity Runbook: parity-runbook.md
  - Reference:
    - rbt CLI: cli.md
    - Configuration: configuration.md
    - Troubleshooting: troubleshooting.md
    - Bash Internals — Setup: setup-readme.md
    - Tileserver-GL API: api/tileserver-api.md
  - Project:
    - Contributing: contributing.md
    - Changelog: changelog.md
    - Security: security.md
