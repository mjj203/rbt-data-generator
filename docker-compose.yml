# RBT Vector Tiles Compose file.
#
# Profiles:
#   setup       — one-shot database initialization
#   production  — continuous OSM updates + tile generation
#   serve       — optional tileserver-gl in front of the generated tiles
#   smoke       — fast end-to-end sanity check
#   monitoring  — optional Prometheus exporter
#
# Usage examples:
#   docker compose --profile setup up rbt-setup
#   docker compose --profile production up -d
#   docker compose --profile production --profile serve up -d

x-rbt-image: &rbt-image
  build:
    context: .
    dockerfile: Dockerfile.production
  image: rbt-vector-tiles:latest

x-rbt-env: &rbt-env
  PG_HOST: postgres
  PG_PORT: 5432
  PG_DATABASE: ${PG_DATABASE:-rbt}
  PG_USR: ${PG_USR:-rbt_user}
  PG_PASS: ${PG_PASS:-rbt_password}
  DATABASE_HOST: postgres
  DATABASE_PORT: 5432
  DATABASE_NAME: ${PG_DATABASE:-rbt}
  DATABASE_USER: ${PG_USR:-rbt_user}
  DATABASE_PASSWORD: ${PG_PASS:-rbt_password}
  MAX_PARALLEL_JOBS: ${MAX_PARALLEL_JOBS:-4}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  # OSM state (planet PBF, imposm cache, replication/diff state) must live on
  # the shared persistent ./output mount: the code defaults to /mnt/* (ephemeral
  # container paths), and `rbt osm run` needs the imposm cache produced by
  # `rbt setup --all`, so both services must see the same directories.
  OSM_DATA_DIR: ${OSM_DATA_DIR:-/app/output/osm/data}
  OSM_CACHE_DIR: ${OSM_CACHE_DIR:-/app/output/osm/cache}
  OSM_DIFF_DIR: ${OSM_DIFF_DIR:-/app/output/osm/diff}

services:
  postgres:
    image: postgis/postgis:18-3.6
    container_name: rbt-postgres
    environment:
      POSTGRES_DB: ${PG_DATABASE:-rbt}
      POSTGRES_USER: ${PG_USR:-rbt_user}
      POSTGRES_PASSWORD: ${PG_PASS:-rbt_password}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - rbt-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USR:-rbt_user} -d ${PG_DATABASE:-rbt}"]
      interval: 30s
      timeout: 10s
      retries: 3

  rbt-setup:
    <<: *rbt-image
    container_name: rbt-setup
    environment: *rbt-env
    volumes:
      - ./output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rbt-network
    command: ["rbt", "setup", "--all"]
    profiles:
      - setup

  rbt-osm-updates:
    <<: *rbt-image
    container_name: rbt-osm-updates
    environment: *rbt-env
    volumes:
      - ./output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rbt-network
    restart: unless-stopped
    command: ["rbt", "osm", "run"]
    # The supervisor gives imposm 30s after SIGTERM before SIGKILL; compose's
    # default 10s would kill the container mid-shutdown.
    stop_grace_period: 35s
    profiles:
      - production

  rbt-tiles:
    <<: *rbt-image
    container_name: rbt-tiles
    environment:
      <<: *rbt-env
      TILE_CACHE_DIR: /app/output/tiles
    volumes:
      - ./output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rbt-network
    profiles:
      - production

  rbt-smoke:
    <<: *rbt-image
    container_name: rbt-smoke
    environment: *rbt-env
    volumes:
      - ./output:/app/output
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rbt-network
    command: ["rbt", "smoke"]
    profiles:
      - smoke

  tile-server:
    image: maptiler/tileserver-gl:v5.6.0
    container_name: rbt-tile-server
    volumes:
      - ./output/tiles:/data
      - ./config/tile-server.json:/data/config.json:ro
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - rbt-tiles
    networks:
      - rbt-network
    profiles:
      - serve
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: rbt-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - rbt-network
    profiles:
      - monitoring

volumes:
  postgres_data:
  prometheus_data:

networks:
  rbt-network:
    driver: bridge
